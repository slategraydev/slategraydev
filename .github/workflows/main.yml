name: generate pacman game

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # RESTORE THE BRAIN
      - name: restore intelligence cache
        id: cache-intelligence
        uses: actions/cache@v4
        with:
          path: pacman-intelligence.json
          # Use a constant key so it always retrieves the latest "brain"
          key: pacman-intelligence-${{ runner.os }}-${{ github.run_id }}
          # restore-keys allows it to grab the most recent cache if an exact match isn't found
          restore-keys: |
            pacman-intelligence-${{ runner.os }}-

      - name: generate pacman-contribution-graph.svg
        uses: slategraydev/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # PUSH THE SVG (Cleanly)
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Note: actions/cache automatically SAVES the file at the end of the job
      # if the path 'pacman-intelligence.json' was modified.
